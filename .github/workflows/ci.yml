on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          mkdir -p backend
          touch backend/.env

      - name: Start containers
        run: docker compose up -d --build


      - name: Run tests
        run: docker compose run --rm backend pytest

      - name: Stop containers
        if: always()
        run: docker compose down