services:
  caddy:
    image: caddy:2.8-alpine
    container_name: talentup-caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - ./infra/Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: talentup-frontend
    restart: unless-stopped
    expose:
      - "80"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: talentup-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      RESUME_UPLOAD_DIR: /app/backend/uploads/resumes
      MAX_PDF_SIZE_BYTES: ${MAX_PDF_SIZE_BYTES:-5242880}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      OAUTH_SESSION_SECRET: ${OAUTH_SESSION_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    expose:
      - "8000"
    volumes:
      - backend_uploads:/app/backend/uploads
    command: >
      sh -c "alembic upgrade head &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000"

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: talentup-celery-worker
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_URL: redis://redis:6379/0
      CELERY_ENABLED: "1"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    volumes:
      - backend_uploads:/app/backend/uploads
    command: >
      sh -c "alembic upgrade head &&
      celery -A notifications.tasks worker -l info"

  redis:
    image: redis:7-alpine
    container_name: talentup-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  backend_uploads:
  redis_data:
  caddy_data:
  caddy_config:
