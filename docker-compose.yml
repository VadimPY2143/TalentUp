services:
  postgres:
    image: postgres:16
    container_name: talentup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: talentup
      POSTGRES_USER: talentup
      POSTGRES_PASSWORD: talentup
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentup -d talentup"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: talentup-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: talentup-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: talentup
      POSTGRES_USER: talentup
      POSTGRES_PASSWORD: talentup
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      VACANCY_DIGEST_INTERVAL_MINUTES: 10080
      VACANCY_DIGEST_DISPATCH_INTERVAL_SECONDS: 1800
      JWT_SECRET_KEY: change-me-in-production
      FRONTEND_ORIGIN: http://localhost:5173
      RESUME_UPLOAD_DIR: uploads/resumes
      MAX_PDF_SIZE_BYTES: 5242880
    ports:
      - "8001:8000"
    volumes:
      - ./:/app
      - backend_uploads:/app/backend/uploads
    command: >
      sh -c "alembic upgrade head &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend"

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: talentup-celery-worker
    restart: unless-stopped
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: talentup
      POSTGRES_USER: talentup
      POSTGRES_PASSWORD: talentup
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      VACANCY_DIGEST_INTERVAL_MINUTES: 10080
      VACANCY_DIGEST_DISPATCH_INTERVAL_SECONDS: 1800
    volumes:
      - ./:/app
      - backend_uploads:/app/backend/uploads
    command: >
      celery -A worker.messages.celery_app.celery_app worker --pool=solo --loglevel=INFO

  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: talentup-celery-beat
    restart: unless-stopped
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: talentup
      POSTGRES_USER: talentup
      POSTGRES_PASSWORD: talentup
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      VACANCY_DIGEST_INTERVAL_MINUTES: 10080
      VACANCY_DIGEST_DISPATCH_INTERVAL_SECONDS: 1800
    volumes:
      - ./:/app
      - backend_uploads:/app/backend/uploads
    command: >
      celery -A worker.messages.celery_app.celery_app beat --loglevel=INFO --schedule=/tmp/celerybeat-schedule

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentup-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8001
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  frontend_node_modules:
