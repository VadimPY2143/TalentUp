services:
  postgres:
    image: postgres:16
    container_name: talentup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: talentup
      POSTGRES_USER: talentup
      POSTGRES_PASSWORD: talentup
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentup -d talentup"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: talentup-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: talentup
      POSTGRES_USER: talentup
      POSTGRES_PASSWORD: talentup
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET_KEY: change-me-in-production
      FRONTEND_ORIGIN: http://localhost:5173
      RESUME_UPLOAD_DIR: uploads/resumes
      MAX_PDF_SIZE_BYTES: 5242880
    ports:
      - "8001:8000"
    volumes:
      - backend_uploads:/app/backend/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentup-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8001
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  backend_uploads:
